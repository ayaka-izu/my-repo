name: Environmental
on:
  workflow_dispatch:
    inputs:
      environment-name:
        type: environment
        default: test
        required: false
        description: Environment name
jobs:
  print:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment-name }}
    env:
      ENV_NAME: ${{ vars.environment-name }}
      PASSWORD: ${{ secrets.password }}
    steps:
      - run: echo "${ USER_NAME }"
      - run: echo "${ PASSWORD:0:1 }${ PASSWORD#? }"
